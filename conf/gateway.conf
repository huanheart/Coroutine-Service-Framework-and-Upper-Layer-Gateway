exact /health 127.0.0.1:9000
route /service1 127.0.0.1:8001,127.0.0.1:8002
route / 127.0.0.1:8080
black 192.168.1.100
qps 1000
jwt_enabled on
jwt_secret demo-secret
jwt_issuer demo-issuer
jwt_audience demo-audience
max_body_size 4194304
timeout_connect_ms 2000
timeout_send_ms 2000
timeout_recv_ms 2000
heartbeat_interval_ms 30000
heartbeat_path /health
enable_heartbeat on
